<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Ton aventure — WMG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{--ink:#2B2D33;--ink-soft:#3A3D45;--gray:#6B7280;--gold:#D4AF37;--gold-dark:#B8942A;--cta:#2D5BFF;--bg:#F7F5F1;--line:#E8E4DC;--white:#fff;--green:#3d9a50}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Montserrat',system-ui,sans-serif;color:var(--ink);overflow-x:hidden;
    background:
      radial-gradient(1200px 620px at 50% -12%, #FBF9F4, #F1ECE2),
      repeating-linear-gradient(0deg, transparent 0 63px, rgba(212,175,55,0.045) 63px 64px),
      repeating-linear-gradient(90deg, transparent 0 63px, rgba(212,175,55,0.045) 63px 64px);
    display:flex;flex-direction:column;min-height:100%;
  }
  /* HUD haut */
  .hud{display:flex;align-items:center;gap:14px;padding:16px 20px;flex-wrap:wrap}
  .hud img{height:30px}
  .bar{flex:1;min-width:120px;height:12px;background:#EDE7DB;border-radius:99px;overflow:hidden}
  .bar>span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-dark));border-radius:99px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .pts{display:flex;align-items:center;gap:6px;background:#FDF8EA;border:2px solid var(--gold);border-radius:99px;padding:5px 14px;font-weight:800;color:var(--gold-dark);font-size:15px}
  .iconbtn{background:#fff;border:2px solid var(--line);border-radius:12px;width:40px;height:40px;font-size:18px;cursor:pointer;line-height:1}
  /* scène */
  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 18px 26px}
  .card{width:100%;max-width:580px;background:var(--white);border:2px solid var(--line);border-radius:28px;padding:40px 34px 30px;text-align:center;box-shadow:0 30px 70px rgba(43,45,51,.13);animation:pop .34s cubic-bezier(.2,.9,.3,1.2)}
  @keyframes pop{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
  .emoji{font-size:84px;line-height:1;margin-bottom:6px;display:inline-block}
  .emoji.wiggle{animation:wig 1.5s ease-in-out infinite}
  @keyframes wig{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
  .kicker{color:var(--gold-dark);font-weight:800;letter-spacing:2px;text-transform:uppercase;font-size:12.5px;margin-bottom:10px}
  h1{font-family:'Roboto',sans-serif;font-weight:900;font-size:28px;line-height:1.2;margin-bottom:12px}
  h1 .g{color:var(--gold-dark)}
  p.msg{font-size:17.5px;color:var(--ink-soft);line-height:1.55;max-width:440px;margin:0 auto 24px}
  .shot{width:100%;border-radius:16px;border:2px solid var(--line);margin:4px 0 20px;box-shadow:0 14px 30px rgba(43,45,51,.12)}
  .embed{position:relative;width:100%;border-radius:18px;overflow:hidden;border:2px solid var(--gold);margin:2px 0 18px;box-shadow:0 18px 40px rgba(212,175,55,.22)}
  .embed iframe{width:100%;height:min(72vh,640px);border:0;display:block;background:#fff}
  .embed .tag{position:absolute;top:10px;left:10px;background:var(--gold);color:#fff;font-family:'Montserrat';font-weight:800;font-size:11px;letter-spacing:1px;padding:5px 11px;border-radius:20px;z-index:2;box-shadow:0 4px 12px rgba(212,175,55,.4)}
  .slider{margin:4px 0 16px}
  .sld-stage{position:relative}
  .sld-stage img{margin:0}
  .sld-dots{display:flex;gap:6px;justify-content:center;margin:12px 0 8px;flex-wrap:wrap}
  .sld-dots i{width:9px;height:9px;border-radius:50%;background:var(--line);transition:.15s}
  .sld-dots i.on{background:var(--gold);transform:scale(1.25)}
  .sld-ctrl{display:flex;align-items:center;justify-content:center;gap:16px}
  .sld-b{width:46px;height:46px;border-radius:50%;border:2px solid var(--line);background:#fff;font-size:24px;line-height:1;cursor:pointer;color:var(--ink);font-weight:800}
  .sld-b:active{transform:scale(.94)}
  .sld-b:disabled{opacity:.35;cursor:default}
  .sld-count{font-weight:800;color:var(--gray);font-size:14px;min-width:54px;text-align:center}
  .btns{display:flex;flex-direction:column;gap:11px}
  .btn{border:none;cursor:pointer;font-family:'Montserrat';font-weight:800;font-size:17px;padding:16px 20px;border-radius:15px;transition:transform .1s}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:var(--cta);color:#fff;box-shadow:0 12px 24px rgba(45,91,255,.28)}
  .btn.gold{background:var(--gold);color:#fff;box-shadow:0 12px 24px rgba(212,175,55,.3)}
  .btn.green{background:var(--green);color:#fff;box-shadow:0 12px 24px rgba(61,154,80,.28)}
  .btn.ghost{background:#fff;color:var(--ink);border:2px solid var(--line)}
  .btn small{display:block;font-weight:600;font-size:12.5px;color:var(--gray);margin-top:2px}
  .btn.primary small,.btn.gold small,.btn.green small{color:rgba(255,255,255,.85)}
  .prev{margin-top:14px;background:none;border:none;color:var(--gray);font-family:'Montserrat';font-weight:600;font-size:13.5px;cursor:pointer}
  .hint{font-size:13px;color:var(--gray);margin-top:12px;background:#FBF9F4;border-radius:12px;padding:10px 14px}
  .flow{display:flex;justify-content:center;gap:5px;align-items:center;margin:4px 0 20px;flex-wrap:wrap}
  .chip{background:#FBF9F4;border:2px solid var(--line);border-radius:14px;padding:10px 8px;min-width:82px}
  .chip .e{font-size:26px}.chip .n{font-size:11px;font-weight:800;margin-top:2px}
  .flow .arr{color:var(--gold-dark);font-weight:900;font-size:18px}
  /* mascotte */
  .mascot{position:fixed;left:16px;bottom:16px;display:flex;align-items:flex-end;gap:10px;max-width:min(360px,86vw);z-index:6;pointer-events:none}
  .mascot .face{font-size:46px;flex:none;filter:drop-shadow(0 6px 10px rgba(0,0,0,.15));animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .bubble{background:#fff;border:2px solid var(--line);border-radius:16px 16px 16px 4px;padding:11px 15px;font-size:14px;font-weight:600;color:var(--ink);box-shadow:0 10px 26px rgba(43,45,51,.12)}
  .bubble b{color:var(--gold-dark)}
  /* map chapitres */
  .map{width:100%;max-width:620px}
  .map h2{font-family:'Roboto';font-weight:900;font-size:26px;text-align:center;margin-bottom:6px}
  .map .sub{text-align:center;color:var(--gray);margin-bottom:22px}
  .chap{display:flex;align-items:center;gap:16px;background:#fff;border:2px solid var(--line);border-radius:18px;padding:16px 18px;margin-bottom:12px;cursor:pointer;transition:transform .12s,box-shadow .12s}
  .chap:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(43,45,51,.1)}
  .chap.locked{opacity:.55;cursor:not-allowed}
  .chap.locked:hover{transform:none;box-shadow:none}
  .chap .ce{font-size:34px;flex:none;width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:#FBF9F4;border-radius:14px}
  .chap.done .ce{background:#EFF7EF}
  .chap .ct{flex:1}
  .chap .ct .tt{font-family:'Roboto';font-weight:900;font-size:17px}
  .chap .ct .ss{font-size:13px;color:var(--gray)}
  .chap .state{font-weight:800;font-size:13px;flex:none}
  .chap.done .state{color:var(--green)}
  .chap.current .state{color:var(--cta)}
  .chap.locked .state{color:var(--gray)}
  .badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0 20px}
  .bdg{font-size:26px;filter:grayscale(1);opacity:.3}
  .bdg.on{filter:none;opacity:1}
  /* overlay reward */
  .over{position:fixed;inset:0;background:rgba(43,45,51,.55);display:flex;align-items:center;justify-content:center;z-index:20;animation:fade .3s;padding:20px}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .rew{background:#fff;border-radius:26px;padding:38px 30px;text-align:center;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.3);animation:pop .4s}
  .rew .bg{font-size:78px;animation:wig 1.4s ease-in-out infinite}
  .rew h3{font-family:'Roboto';font-weight:900;font-size:24px;margin:8px 0 6px}
  .rew p{color:var(--ink-soft);margin-bottom:20px}
  .confetti{position:fixed;top:-10px;font-size:20px;animation:fall 2.6s linear forwards;pointer-events:none;z-index:30}
  @keyframes fall{to{transform:translateY(108vh) rotate(380deg);opacity:.9}}
  .foot{text-align:center;color:var(--gray);font-size:11.5px;padding:0 0 12px}

  /* ---------- MOBILE ---------- */
  @media(max-width:560px){
    .hud{padding:12px 14px;gap:10px}
    .hud img{height:26px}
    /* on réserve de la place en bas pour que la mascotte (fixée) ne cache jamais le bouton */
    .stage{padding:4px 12px 118px}
    .card{padding:28px 20px 24px;border-radius:22px}
    .emoji{font-size:62px}
    h1{font-size:23px}
    p.msg{font-size:16px}
    .btn{font-size:16px;padding:15px 18px}
    /* l'éditeur embarqué : un peu plus court sur téléphone */
    .embed iframe{height:min(62vh,520px)}
    /* mascotte compacte */
    .mascot{max-width:76vw;left:10px;bottom:10px;gap:8px}
    .mascot .face{font-size:36px}
    .bubble{font-size:12.5px;padding:9px 12px}
    /* carte des chapitres */
    .map h2{font-size:22px}
    .chap{padding:13px 14px;gap:12px}
  }
</style>
</head>
<body>
  <div class="hud">
    <img src="wmg-logo.png" alt="WMG">
    <div class="bar"><span id="fill"></span></div>
    <div class="pts">⭐ <span id="pts">0</span></div>
    <button class="iconbtn" id="mute" title="Son">🔊</button>
    <button class="iconbtn" id="home" title="Carte des chapitres">🗺️</button>
  </div>
  <div class="stage"><div id="view"></div></div>
  <div class="mascot" id="mascot" style="display:none"><div class="face" id="mface">🤖</div><div class="bubble" id="mbub"></div></div>
  <div class="foot">Ton aventure WMG · ta progression est sauvegardée sur cet appareil</div>

<script src="content.js"></script>
<script>
// ---------- ÉTAT ----------
const KEY='wmg_aventure_v1';
let S = load() || {ch:null, step:0, pts:0, badges:[], doneCh:[], flags:{}, muted:false};
function save(){localStorage.setItem(KEY, JSON.stringify(S))}
function load(){try{return JSON.parse(localStorage.getItem(KEY))}catch(e){return null}}

// ---------- SON (WebAudio, sans fichier) ----------
let AC=null;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return AC}
function tone(f,d,type='sine',vol=.14){if(S.muted)return;const a=ac();if(!a)return;const o=a.createOscillator(),g=a.createGain();o.type=type;o.frequency.value=f;g.gain.value=vol;o.connect(g);g.connect(a.destination);const t=a.currentTime;o.start(t);g.gain.exponentialRampToValueAtTime(.0001,t+d);o.stop(t+d)}
const sPop=()=>tone(500,.11,'triangle');
const sCoin=()=>{tone(880,.07);setTimeout(()=>tone(1180,.12),65)};
const sWin=()=>[523,659,784,1047].forEach((f,k)=>setTimeout(()=>tone(f,.2,'sine',.17),k*95));
const sClick=()=>tone(360,.05,'square',.08);

// ---------- MASCOTTE ----------
function say(txt){const m=document.getElementById('mascot');if(!txt){m.style.display='none';return;}document.getElementById('mface').textContent=FORMATION.mascot.emoji;document.getElementById('mbub').innerHTML=txt;m.style.display='flex'}

// ---------- HUD ----------
function hud(){
  document.getElementById('pts').textContent=S.pts;
  document.getElementById('mute').textContent=S.muted?'🔇':'🔊';
  let pct=0;
  if(S.ch!=null){const ch=FORMATION.chapters[S.ch];pct=Math.round((S.step/(ch.steps.length))*100)}
  document.getElementById('fill').style.width=pct+'%';
}

// ---------- CONFETTI + REWARD ----------
function party(){const em=['🎉','✨','🎊','💛','⭐','🏆'];for(let n=0;n<30;n++){const c=document.createElement('div');c.className='confetti';c.textContent=em[n%em.length];c.style.left=(4+Math.random()*92)+'vw';c.style.animationDelay=(Math.random()*.6)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),2800)}}
function reward(badge,cb){
  sWin();party();
  const o=document.createElement('div');o.className='over';
  o.innerHTML=`<div class="rew"><div class="bg">${badge.emoji}</div><h3>Badge débloqué !</h3><p><b>${badge.name}</b><br>+${badge.bonus||50} points bonus</p><button class="btn gold" style="width:100%">Continuer →</button></div>`;
  document.body.appendChild(o);
  o.querySelector('button').onclick=()=>{o.remove();cb&&cb()};
}

// ---------- RENDU ----------
const view=document.getElementById('view');
function go(){ hud(); save(); if(S.ch==null){renderMap();return;} renderStep(); }

function renderMap(){
  say(`Choisis un chapitre pour continuer ton aventure !`);
  const done=S.doneCh.length, tot=FORMATION.chapters.length;
  let bd = FORMATION.chapters.map(c=>`<span class="bdg ${S.badges.includes(c.id)?'on':''}" title="${c.badge.name}">${c.badge.emoji}</span>`).join('');
  let rows = FORMATION.chapters.map((c)=>{
    const isDone=S.doneCh.includes(c.id);
    const unlocked = c.ready && (c.id===0 || S.doneCh.includes(c.id-1) || isDone);
    const st = isDone?'✓ Terminé' : (!c.ready?'🔒 Bientôt' : (unlocked?'▶ Jouer':'🔒 Verrouillé'));
    const cls = isDone?'done':(unlocked&&!isDone?'current':'locked');
    return `<div class="chap ${cls}" data-ch="${unlocked&&c.ready?c.id:''}">
      <div class="ce">${c.emoji}</div>
      <div class="ct"><div class="tt">${c.title}</div><div class="ss">${c.sub||''}</div></div>
      <div class="state">${st}</div></div>`;
  }).join('');
  view.className='map';
  view.innerHTML=`<h2>Ta carte de l'aventure 🗺️</h2><div class="sub">${done}/${tot} chapitres · ⭐ ${S.pts} points</div>
    <div class="badges">${bd}</div>${rows}
    <p style="text-align:center;font-size:12.5px;color:var(--gray);margin-top:10px">Les chapitres marqués « Bientôt » arrivent très vite 😉</p>`;
  view.querySelectorAll('.chap[data-ch]').forEach(el=>{if(el.dataset.ch!=='')el.onclick=()=>{sClick();S.ch=+el.dataset.ch;S.step=0;go()}});
}

function renderStep(){
  const ch=FORMATION.chapters[S.ch];
  if(S.step>=ch.steps.length){ // fin de chapitre
    if(!S.doneCh.includes(ch.id)){S.doneCh.push(ch.id);S.badges.push(ch.id);S.pts+=(ch.badge.bonus||50);save();reward(ch.badge,()=>{S.ch=null;S.step=0;go()});}
    else{S.ch=null;S.step=0;go()}
    return;
  }
  const s=ch.steps[S.step];
  say(s.say||'');
  view.className='';
  let inner=`<div class="card">`;
  if(s.kicker)inner+=`<div class="kicker">${s.kicker}</div>`;
  if(s.emoji)inner+=`<div class="emoji ${s.wiggle?'wiggle':''}">${s.emoji}</div>`;
  inner+=`<h1>${s.title}</h1>`;
  if(s.flow)inner+=flowHTML();
  if(s.msg)inner+=`<p class="msg">${s.msg}</p>`;
  if(s.shot)inner+=`<img class="shot" src="${s.shot}" alt="capture d'écran annotée">`;
  if(s.slider){
    inner+=`<div class="slider"><div class="sld-stage"><img class="shot" id="sldimg" src="${s.slider[0]}" alt="étape"></div>`
      +`<div class="sld-dots" id="slddots">`+s.slider.map((_,k)=>`<i class="${k===0?'on':''}"></i>`).join('')+`</div>`
      +`<div class="sld-ctrl"><button class="sld-b" id="sldprev" disabled>‹</button>`
      +`<span class="sld-count" id="sldcount">1 / ${s.slider.length}</span>`
      +`<button class="sld-b" id="sldnext">›</button></div></div>`;
  }
  if(s.embed)inner+=`<div class="embed"><span class="tag">EN DIRECT · DANS LE SITE</span><iframe src="${s.embed}" loading="lazy"></iframe></div>`;
  inner+=`<div class="btns">`;
  const btns = s.btns || [{label:s.next||'Suivant →',cls:'primary'}];
  btns.forEach((b,k)=>{inner+=`<button class="btn ${b.cls||'primary'}" data-k="${k}">${b.label}${b.sub?`<small>${b.sub}</small>`:''}</button>`});
  inner+=`</div>`;
  if(s.hint)inner+=`<div class="hint">💡 ${s.hint}</div>`;
  if(S.step>0)inner+=`<button class="prev" id="prev">← précédent</button>`;
  inner+=`</div>`;
  view.innerHTML=inner;
  if(s.slider){
    let i=0; const im=document.getElementById('sldimg'), ct=document.getElementById('sldcount'),
      pv=document.getElementById('sldprev'), nx=document.getElementById('sldnext'),
      dots=document.getElementById('slddots').children;
    const upd=()=>{im.src=s.slider[i]; ct.textContent=(i+1)+' / '+s.slider.length;
      pv.disabled=(i===0); nx.disabled=(i===s.slider.length-1);
      for(let k=0;k<dots.length;k++)dots[k].className=(k===i?'on':''); sPop();};
    pv.onclick=()=>{if(i>0){i--;upd();}};
    nx.onclick=()=>{if(i<s.slider.length-1){i++;upd();}};
  }
  view.querySelectorAll('.btn').forEach(btn=>{btn.onclick=()=>{
    const b=btns[+btn.dataset.k];
    // points
    let gained = b.points!=null?b.points:(s.type==='action'?10:(s.type==='story'||s.type==='meet'?5:0));
    if(gained){S.pts+=gained; (b.points!=null&&b.points>=10)?sCoin():sPop();} else sPop();
    if(b.flag)S.flags[b.flag]=true;
    // avancer : skip si demandé
    S.step += 1 + (b.skip||0);
    go();
  }});
  const p=document.getElementById('prev');if(p)p.onclick=()=>{sClick();S.step=Math.max(0,S.step-1);go()};
}
function flowHTML(){const it=[['🎨','Dessinateur'],['📱','Messager'],['📮','Facteur'],['📷','Instagram']];return '<div class="flow">'+it.map((x,k)=>`<div class="chip"><div class="e">${x[0]}</div><div class="n">${x[1]}</div></div>`+(k<3?'<span class="arr">→</span>':'')).join('')+'</div>'}

// ---------- boutons HUD ----------
document.getElementById('home').onclick=()=>{sClick();S.ch=null;go()};
document.getElementById('mute').onclick=()=>{S.muted=!S.muted;save();hud();if(!S.muted)sPop()};
// reprise
if(S.ch!=null && S.doneCh.includes(S.ch)) S.ch=null;
go();
</script>
</body>
</html>
